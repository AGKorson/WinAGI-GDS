      <h2>Resource Load Error RE16</h2>
      <h3>OBJECT file contains no data</h3>
      <p class="indent_n">The minimum size of a valid <a href="..\..\agi\object.htm">OBJECT</a> file is 8 bytes. This error indicates the file is too small to be valid.</p>
      <p class="indent_n">WinAGI treats the file as having a single <a href="..\..\agi\object.htm#nullitem">null item</a>. Opening and then saving the file in WinAGI will clear the error.</p>
