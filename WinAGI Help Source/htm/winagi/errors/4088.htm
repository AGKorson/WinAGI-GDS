    <h2>Logic Compiler Error 4088</h2>
    <h3>Include file cannot be this logic's source code file</h3>
    <p class="indent_n">This error is raised if the target file for an <a href="..\..\commands\syntax_fan.htm#include"><b>#include</b></a> preprocessor command is the same as the source file that is being compiled. This would create a circular reference and is not allowed.</p>
