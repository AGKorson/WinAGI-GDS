    <h2>Logic Compiler Error 4038</h2>
    <h3>&lt;item&gt; is not a valid inventory item</h3>
    <p class="indent_n">When using text values as inventory item argument values, this error is raised if the text value is not an <a href="..\..\agi\invitems.htm">inventory item</a> in the game's <a href="..\..\agi\object.htm">OBJECT file</a>. This is usually caused by a typographical error.</p>
