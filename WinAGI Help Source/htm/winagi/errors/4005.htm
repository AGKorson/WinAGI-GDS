    <h2>Logic Compiler Error 4005</h2>
    <h3>';' expected at end of statement</h3>
    <p class="indent_n">All <a href="..\..\commands\syntax_fan.htm#actions">action command</a> statements must include a semicolon to indicate the end of the statement. Goto statements must also end with a semicolon.</p>

      <pre>equaln(v99, 0)   [ <font color="red"><b>NOT OK</b></font>; need ending ';'
addn(v99, 5);   [ OK
