    <h2>Logic Compiler Error 4001</h2>
    <h3>'(' expected at start of '<code>if</code>' statement</h3>
    <p class="indent_n"> The <a href="..\..\commands\cmds_test.htm">test commands</a> in an <code><b>if</b></code> statement must be enclosed in parentheses.</p>
    <blockquote>
      <pre>if v99 == 0   [ <font color="red"><b>NOT OK</b></font>
... 
if(v99 == 0) [ OK
...</pre>
