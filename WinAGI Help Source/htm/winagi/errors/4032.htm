    <h2>Logic Compiler Error 4032</h2>
    <h3>Error accessing include file '&lt;filename&gt;'</h3>
    <p class="indent_n">If the compiler is unable to open an <a href="..\..\commands\syntax_fan.htm#include">include file</a> for any reason, this compiler error is raised. Verify the file is not corrupted, or is not locked by another program.</p>
