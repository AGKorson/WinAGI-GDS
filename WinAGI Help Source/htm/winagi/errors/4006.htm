    <h2>Logic Compiler Error 4006</h2>
    <h3>'{' not allowed unless following '<code>if</code>' or '<code>else</code>'</h3>
    <p class="indent_n">Curly braces are used to designate blocks of code to be executed as part of an <a href="..\..\commands\syntax_fan.htm#ifelse">if statement or else statement</a>. They cannot be used anywhere else.</p>

      <pre>v99 = 1;
{  [ <font color="red"><b>NOT OK</b></font>
v100 = 2;
...</pre>
