    <h2>Logic Compiler Error 4033</h2>
    <h3>Expected test command, but found closing bracket</h3>
    <p class="indent_n">
      If an OR operator ('||') or AND operator ('&amp;&amp;') is accidentally
      followed by a parenthesis, this compiler error is raised. For example:
    </p>
    <blockquote>
      <pre>if(v1==1 &amp;&amp; )  [ <font color="red"><b>NOT OK</b></font>
...</pre>
    </blockquote>
