    <h2>Logic Compiler Error 4057</h2>
    <h3>Unexpected end of input</h3>
    <p class="indent_n">This compiler error is raised if the compiler is expecting a token or symbol but the end of the source text is encountered. It probably means the source is incomplete or a chunk of the source was unintentionally deleted. </p>
