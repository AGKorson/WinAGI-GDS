    <h2>Logic Compiler Warning 5053</h2>
    <h3>Using new.room command on a non-existent room will crash AGI</h3>
    <p class="indent_n">When AGI executes the <a href="..\..\commands\cmd_newroom.htm"><b>new.room</b></a> command, it attempts to load the associated <a href="..\..\agi\logics.htm">logic</a> for the new <a href="..\..\agi\pictures.htm#room">room</a>. If the logic does not exist, AGI will raise a <a href="..\..\agi\errors.htm">runtime error</a> and crash.</p>
