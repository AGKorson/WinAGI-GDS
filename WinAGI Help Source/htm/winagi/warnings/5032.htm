    <h2>Logic Compiler Warning 5032</h2>
    <h3>'&lt;token&gt;' is already defined as a reserved name</h3>
    <p class="indent_n">Other than for numbers and text, it is unusual to use a <a href="..\..\commands\syntax_fan.htm#defines">local define</a> to refer to the same value as a <a href="..\reservednames.htm">reserved name</a>. Unless you meant to do this, you should check your code to be sure it will run as expected.</p>
