    <h2>Logic Compiler Warning 5010</h2>
    <h3>Using call command on logic 0 can cause game to crash</h3>
    <p class="indent_n"><a href="..\..\agi\logics.htm#logic0">Logic 0</a> is always loaded, and runs on every <a href="..\..\agi\cycle.htm">interpreter cycle</a>. Calling logic 0 from within another logic can result in recursive calls until the <a href="..\..\agi\errors.htm#stack">stack is blown</a>.</p>
